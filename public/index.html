<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="authSection">
    <h1>TaskFlow</h1>
    <div id="loginForm">
      <h2>Login</h2>
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button onclick="login()">Login</button>
      <p>No account? <a href="#" onclick="showRegister()">Register</a></p>
    </div>

    <div id="registerForm" style="display:none;">
      <h2>Register</h2>
      <input type="text" id="registerName" placeholder="Name">
      <input type="email" id="registerEmail" placeholder="Email">
      <input type="password" id="registerPassword" placeholder="Password">
      <button onclick="register()">Register</button>
      <p>Have an account? <a href="#" onclick="showLogin()">Login</a></p>
    </div>
  </div>

  <div id="appSection" style="display:none;">
    <header>
      <h1>TaskFlow</h1>
      <span id="userName"></span>
      <button onclick="logout()">Logout</button>
    </header>

    <div id="projectsView">
      <h2>Your Projects</h2>
      <div id="newProjectForm">
        <input type="text" id="newProjectName" placeholder="Project name">
        <input type="text" id="newProjectDesc" placeholder="Description">
        <button onclick="createProject()">Create Project</button>
      </div>
      <div id="projectsList"></div>
    </div>

    <div id="boardView" style="display:none;">
      <button onclick="backToProjects()">&larr; Back to Projects</button>
      <h2 id="boardProjectName"></h2>
      <div id="newTaskForm">
        <input type="text" id="newTaskTitle" placeholder="Task title">
        <input type="text" id="newTaskDesc" placeholder="Description">
        <button onclick="createTask()">Add Task</button>
      </div>

      <div class="board">
        <div class="column" data-status="todo">
          <h3>To Do</h3>
          <div class="cards" id="todoCards"></div>
        </div>
        <div class="column" data-status="in-progress">
          <h3>In Progress</h3>
          <div class="cards" id="inProgressCards"></div>
        </div>
        <div class="column" data-status="done">
          <h3>Done</h3>
          <div class="cards" id="doneCards"></div>
        </div>
      </div>
    </div>

    <div id="taskModal" style="display:none;">
      <div class="modal-content">
        <button onclick="closeModal()" class="close-btn">&times;</button>
        <h3 id="modalTaskTitle"></h3>
        <p id="modalTaskDesc"></p>
        <select id="modalTaskStatus" onchange="updateTaskStatus()">
          <option value="todo">To Do</option>
          <option value="in-progress">In Progress</option>
          <option value="done">Done</option>
        </select>
        <h4>Comments</h4>
        <div id="commentsList"></div>
        <input type="text" id="newCommentText" placeholder="Add a comment...">
        <button onclick="addComment()">Send</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
